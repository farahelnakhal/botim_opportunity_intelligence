# Render Blueprint — deploy the BOTIM Opportunity Intelligence assistant
# (frontend + read-only dashboard API + grounded copilot). See
# executive-ui/README.md, "Deploy for free", for the full walkthrough.
#
# In the Render dashboard: New + -> Blueprint -> connect this repo -> Render
# reads this file automatically. Env vars marked `sync: false` are prompted
# for in the dashboard and NEVER stored in the repo (secrets stay on request).
services:
  - type: web
    name: botim-opportunity-intelligence
    runtime: docker
    region: oregon
    dockerfilePath: ./executive-ui/deploy/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/overview
    autoDeployTrigger: commit
    envVars:
      # ---- Application mode --------------------------------------------- #
      # normal = the real product (clean workspace, no demo corpus/persona).
      # Set to `demo` only for a public showcase build. Explicit here so the
      # served mode is unambiguous (the image also defaults to normal).
      - key: BOTIM_APP_MODE
        value: normal

      # ---- Authentication (Phase R8a) ------------------------------------ #
      # off = today's open single-tenant behavior. Flip to `required` to put
      # the whole app (API + chat) behind email+password sign-in; new records
      # then belong to their creator. Optionally set AUTH_ALLOW_REGISTRATION=0
      # once the intended accounts exist. Password reset arrives with R6 email.
      - key: BOTIM_AUTH_MODE
        value: "off"

      # ---- Canonical LLM configuration (drives ALL grounded chat) ------- #
      # The copilot, synthesis, research claim-extraction, and Merchant Voice
      # all resolve through these BOTIM_LLM_* variables (shared/llm/provider.py).
      # An OpenAI-compatible endpoint (Groq, OpenAI, Ollama, vLLM, ...) needs
      # BASE_URL + MODEL; an Anthropic Claude model is inferred from a claude-*
      # model name / sk-ant- key and needs no BASE_URL.
      #
      # Default: Groq (free, OpenAI-compatible). The 70B model is chosen over a
      # small/instant model because decision-oriented synthesis is the product's
      # core value — a smaller model gives noticeably shallower analysis. Both
      # support tool use (needed for the copilot's grounded tool loop).
      - key: BOTIM_LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: BOTIM_LLM_MODEL
        value: llama-3.3-70b-versatile
      # The model API key — prompted for in the dashboard, never committed.
      - key: BOTIM_LLM_API_KEY
        sync: false
      # NOTE: with NO key set, chat returns honest "not configured" errors —
      # it never silently falls back to the deterministic demo responder in
      # normal mode. Set BOTIM_LLM_PROVIDER=mock only for an explicit demo.

      # ---- Live external research + monitoring (optional) --------------- #
      # Enables the Research workspace's live runs and manual monitoring runs.
      # Without these, research/monitoring fail honestly ("no search provider
      # configured") — the rest of the product works normally. Brave Search
      # has a free tier (https://brave.com/search/api).
      - key: RESEARCH_SEARCH_PROVIDER
        value: brave
      - key: BRAVE_SEARCH_API_KEY
        sync: false

      # ---- Scheduled monitoring + email (Phase R6) --------------------- #
      # Scheduled re-runs are driven by an EXTERNAL cron (GitHub Actions —
      # see .github/workflows/monitoring-tick.yml) hitting POST
      # /api/monitoring/tick, because the free tier sleeps on idle. Two
      # secrets are prompted for (never committed); the GitHub side needs the
      # SAME token as a repo secret plus a MONITORING_TICK_URL repo variable —
      # that is a SEPARATE, also-required setup step (see executive-ui/README).
      # MONITORING_TICK_TOKEN must equal the GitHub repo secret of the same name
      - key: MONITORING_TICK_TOKEN
        sync: false
      # HMAC key for signing unsubscribe links (rotating it dead-links old ones)
      - key: MONITORING_UNSUBSCRIBE_SIGNING_KEY
        sync: false
      - key: MONITORING_TICK_MAX_CHATS
        value: "25"
      - key: MONITORING_MIN_CADENCE_HOURS
        value: "4"
      - key: MONITORING_DEFAULT_CADENCE_HOURS
        value: "6"
      - key: MONITORING_CONFIRM_TTL_HOURS
        value: "48"
      # per-day cap PER ACTIVE SUBSCRIPTION (scaled by the owner's sub count)
      - key: QUOTA_MONITORING_WORKSPACE_RUN_PER_DAY
        value: "6"
      # Absolute base for links in emails; falls back to the request Host
      # header if unset. Set to the real service URL for correct links.
      - key: MONITORING_PUBLIC_BASE_URL
        value: https://botim-opportunity-intelligence.onrender.com

      # ---- Outbound email relay (SMTP; pure stdlib, no SDK) ------------- #
      # Provider-neutral: point at any SMTP relay (SES/Postmark/Resend/...).
      # With SMTP_HOST/SMTP_FROM unset, monitoring + confirmation email is an
      # honest "not sent (no SMTP configured)" no-op — the rest of the app is
      # unaffected. Host/From/credentials are deployment-specific -> prompted.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_STARTTLS
        value: "true"
      - key: SMTP_SSL
        value: "false"
