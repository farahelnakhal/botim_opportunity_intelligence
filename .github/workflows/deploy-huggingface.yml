name: Deploy to Hugging Face Space

# Mirrors this repo to a free Hugging Face Space (Docker SDK) so the assistant
# UI is reachable at a single public URL — see executive-ui/README.md, section
# "Deploy for free". Requires two one-time repo settings (skipped harmlessly
# if absent, so this never breaks CI for anyone who hasn't set it up):
#   - Secret   HF_TOKEN : a Hugging Face access token with write access
#   - Variable HF_SPACE : "your-hf-username/your-space-name"

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy is configured
        id: check
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "HF_TOKEN and/or the HF_SPACE variable are not set — skipping deploy."
            echo "See executive-ui/README.md, 'Deploy for free', to enable this."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Space source (Dockerfile + README at root)
        if: steps.check.outputs.ready == 'true'
        run: |
          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space
          rsync -a \
            --exclude='.git' \
            --exclude='executive-ui/web/node_modules' \
            --exclude='executive-ui/web/dist' \
            --exclude='**/__pycache__' \
            ./ /tmp/hf-space/
          cp executive-ui/deploy/Dockerfile /tmp/hf-space/Dockerfile
          cp executive-ui/deploy/space_readme.md /tmp/hf-space/README.md

      - name: Push to Hugging Face Space
        if: steps.check.outputs.ready == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          cd /tmp/hf-space
          git init -q -b main
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              add -A
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -q -m "Deploy from ${{ github.repository }}@${{ github.sha }}"
          git push --force "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" main:main
